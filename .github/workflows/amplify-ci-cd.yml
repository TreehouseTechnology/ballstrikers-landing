name: Amplify CI/CD

on:
  pull_request:
    paths:
      - "**"
  push:
    branches:
      - main
    paths:
      - "**"
  workflow_dispatch:

jobs:
  verify:
    name: Lint, Typecheck, Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  deploy:
    name: Trigger Amplify Deploy
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      id-token: write
      contents: read
    env:
      AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
      AMPLIFY_BRANCH: ${{ vars.AMPLIFY_BRANCH }}
      AWS_REGION: ${{ vars.AWS_REGION }}
    steps:
      - name: Validate required CI/CD variables
        shell: bash
        run: |
          set -euo pipefail
          test -n "${AMPLIFY_APP_ID}" || (echo "Missing repository variable: AMPLIFY_APP_ID" && exit 1)
          test -n "${AMPLIFY_BRANCH}" || (echo "Missing repository variable: AMPLIFY_BRANCH" && exit 1)
          test -n "${AWS_REGION}" || (echo "Missing repository variable: AWS_REGION" && exit 1)
          test -n "${{ secrets.AWS_AMPLIFY_DEPLOY_ROLE_ARN }}" || (echo "Missing repository secret: AWS_AMPLIFY_DEPLOY_ROLE_ARN" && exit 1)

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_AMPLIFY_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger Amplify release job
        shell: bash
        run: |
          set -euo pipefail
          aws amplify start-job \
            --app-id "${AMPLIFY_APP_ID}" \
            --branch-name "${AMPLIFY_BRANCH}" \
            --job-type RELEASE
